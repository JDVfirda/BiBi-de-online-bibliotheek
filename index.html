<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">BiBi.nl</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item ms-3">
  <a href="#" class="btn btn-outline-light">Log in</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Cataloog</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Mijn Boeken</a></li>

<section class="hero text-center">

    <!-- Title -->
    <h1 class="display-2 fw-bold hero-title">

    <a href="#" class="btn btn-primary btn-lg mb-5">
      Registreer nu!
    </a>

    <!-- Cards -->
    <div class="row justify-content-center g-4">

      </div>

      <div class="col-md-4 d-flex">
        <div class="card p-3 shadow w-100">
          <h3>Hulp nodig? Wij helpen u graag!</h3>
          <a href="#" class="btn btn-outline-primary w-100">Help!</a>
        </div>
      </div>

    </div>

  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
