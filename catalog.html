<!-- catalog content -->
 
 <!-- Search bar -->
<div class="w-50 mx-auto mt-5 mb-4">
  <form class="d-flex">
    <input type="text" id="search" class="form-control me-2" placeholder="Zoek boeken...">
    <button class="btn btn-primary">Zoek</button>
  </form>
</div>

<!-- Catalog -->
<div class="catalog-container">
  <div class="row" id="catalog"></div>
</div>



<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">

  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Inloggen</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

       <form>
          <div class="mb-3">
            <label class="form-label">Gebruikersnaam/E-mail</label>
            <input type="text" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Wachtwoord</label>
            <input type="password" class="form-control">
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Inloggen
          </button>
          <a href="register.html" class="register d-block text-center text-primary mt-3">
            Nog geen account? Klik hier!
          </a>
          <a href="lostPassword.html" class="register d-block text-center text-primary mt-3">
            Wachtwoord vergeten?
          </a>
        </form>

      </div>

    </div>
  </div>

</div>

<!-- Footer -->
<footer class="footer text-center p-1">
  <p class="mb-0">BiBi</p>
</footer>
