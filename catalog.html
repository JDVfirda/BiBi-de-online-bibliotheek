<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogus - BiBi.nl</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="index.html">BiBi.nl</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item ms-3" id="nav-login">
          <a href="#" class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#loginModal">Log in</a>
        </li>
        <li class="nav-item ms-3 d-none" id="nav-gebruiker">
          <span class="navbar-text text-white me-2">Welkom, <span id="nav-voornaam"></span>!</span>
          <a href="#" class="btn btn-outline-light" onclick="uitloggen()">Uitloggen</a>
        </li>
        <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active text-white" href="catalog.html">Catalogus</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="mybooks.html">Mijn Boeken</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="account.html">Account</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="help.html">Help</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Search Bar -->
<div class="container">
  <div class="w-50 mx-auto mt-5 mb-4">
    <form class="d-flex" onsubmit="return false;">
      <input type="text" id="search" class="form-control me-2" placeholder="Zoek boeken...">
      <button class="btn btn-primary" type="button">Zoek</button>
    </form>
  </div>
</div>

<!-- Catalog -->
<main class="flex-grow-1">
  <div class="container-fluid catalog-container">
    <div class="row" id="catalog"></div>
  </div>
</main>
<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Inloggen</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Gebruikersnaam/E-mail</label>
            <input type="text" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Wachtwoord</label>
            <input type="password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100">Inloggen</button>
          <a href="register.html" class="d-block text-center text-primary mt-3">Nog geen account? Klik hier!</a>
          <a href="lostpassword.html" class="d-block text-center text-primary mt-3">Wachtwoord vergeten?</a>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- view book Modal -->
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
   <div class="modal-content border-0 shadow-lg rounded-4">

     <div class="modal-header border-0 pb-0">
       <h3 class="modal-title fw-bold" id="modalTitle"></h3>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">

  <!-- Book image -->
  <img 
    id="modalImage"
    class="img-fluid rounded mb-3"
    style="
      max-height: 450px;
      transition: transform 0.3s ease;
      cursor: zoom-in;
    "
  >

  <!-- Front / Back buttons -->
  <div class="d-flex justify-content-center gap-2 mb-4">
    <button class="btn btn-outline-primary btn-sm" id="showFront">
      Voorkant
    </button>

    <button class="btn btn-outline-secondary btn-sm" id="showBack">
      Achterkant
    </button>
  </div>

 <!-- Book info -->
 <!-- Book info -->
<div class="text-start mt-4 px-2">

  <div class="row mb-2">
    <div class="col-5 fw-semibold">Auteur</div>
    <div class="col-7" id="modalAuthor"></div>
  </div>

  <div class="row mb-2">
    <div class="col-5 fw-semibold">Uitgever</div>
    <div class="col-7" id="modalPublisher"></div>
  </div>

  <div class="row mb-2">
    <div class="col-5 fw-semibold">Publicatiedatum</div>
    <div class="col-7" id="modalYear"></div>
  </div>

  <div class="row mb-2">
    <div class="col-5 fw-semibold">Pagina's</div>
    <div class="col-7" id="modalPages"></div>
  </div>

  <div class="row mb-2">
    <div class="col-5 fw-semibold">Genre</div>
    <div class="col-7" id="modalGenre"></div>
  </div>

  <div class="row mb-2">
    <div class="col-5 fw-semibold">ISBN</div>
    <div class="col-7" id="modalISBN"></div>
  </div>

</div>


      <div class="modal-footer border-0 pt-0">
        <button type="button"
        class="btn btn-outline-secondary px-4"
        data-bs-dismiss="modal">
  Sluiten
</button>

<button class="btn btn-primary px-4"
        id="borrowBookBtn">
  Leen boek
</button>
      </div>
    
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="footer text-center p-1">
  <p class="mb-0">© 2026 BiBi.nl</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>
<script src="js/catalog.js"></script>
</body>
</html>
