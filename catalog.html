<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogus - BiBi.nl</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="index.html">BiBi.nl</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item ms-3">
          <a href="#" class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#loginModal">Log in</a>
        </li>
        <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="catalog.html">Catalogus</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="mybooks.html">Mijn Boeken</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="account.html">Account</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="help.html">Help</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Search Bar -->
<div class="container">
  <div class="w-50 mx-auto mt-5 mb-4">
    <form class="d-flex" onsubmit="return false;">
      <input type="text" id="search" class="form-control me-2" placeholder="Zoek boeken...">
      <button class="btn btn-primary" type="button">Zoek</button>
    </form>
  </div>
</div>

<!-- Catalog -->
<main class="flex-grow-1">
  <div class="container-fluid catalog-container">
    <div class="row" id="catalog"></div>
  </div>
</main>
<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Inloggen</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Gebruikersnaam/E-mail</label>
            <input type="text" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Wachtwoord</label>
            <input type="password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100">Inloggen</button>
          <a href="register.html" class="d-block text-center text-primary mt-3">Nog geen account? Klik hier!</a>
          <a href="lostpassword.html" class="d-block text-center text-primary mt-3">Wachtwoord vergeten?</a>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- view book Modal -->
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">

  <!-- Book image -->
  <img 
    id="modalImage"
    class="img-fluid rounded mb-3"
    style="
      max-height: 450px;
      transition: transform 0.3s ease;
      cursor: zoom-in;
    "
  >

  <!-- Front / Back buttons -->
  <div class="d-flex justify-content-center gap-2 mb-4">
    <button class="btn btn-outline-primary btn-sm" id="showFront">
      Voorkant
    </button>

    <button class="btn btn-outline-secondary btn-sm" id="showBack">
      Achterkant
    </button>
  </div>

  <!-- Book info -->
  <p><strong>Auteur:</strong> <span id="modalAuthor"></span></p>
  <p><strong>Uitgever:</strong> <span id="modalPublisher"></span></p>
  <p><strong>Jaar:</strong> <span id="modalYear"></span></p>
  <p><strong>Genre:</strong> <span id="modalGenre"></span></p>
  <p><strong>ISBN:</strong> <span id="modalISBN"></span></p>

</div>

      <div class="modal-footer">
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Ga terug</button>
        <button class="btn btn-primary" id="borrowBookBtn">Leen boek</button>
      </div>
    
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="footer text-center p-1">
  <p class="mb-0">© 2026 BiBi.nl</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/catalog.js"></script>
</body>
</html>
