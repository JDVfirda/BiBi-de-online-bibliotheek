<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - BiBi.nl</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">BiBi.nl - Admin</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Admin paneel</h2>

<!-- Tabbladen -->
    <ul class="nav nav-tabs mt-3" id="adminTabs">
        <li class="nav-item">
            <a class="nav-link active" data-bs-toggle="tab" href="#boeken">Boeken</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#klanten">Klanten</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-bs-toggle="tab" href="#uitleningen">Uitleningen</a>
        </li>
    </ul>

    <div class="tab-content mt-3">

<!-- Tabblad: Boeken -->
        <div class="tab-pane fade show active" id="boeken">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Boeken beheren</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalBoekToevoegen">
                    Boek toevoegen
                </button>
            </div>
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Titel</th>
                        <th>Auteur</th>
                        <th>Uitgever</th>
                        <th>Genre</th>
                        <th>Jaar</th>
                        <th>Beschikbaar</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="tabel-boeken"></tbody>
            </table>
        </div>

<!-- Tabblad: Klanten -->
        <div class="tab-pane fade" id="klanten">
            <h4 class="mb-3">Klanten beheren</h4>
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Naam</th>
                        <th>Gebruikersnaam</th>
                        <th>Email</th>
                        <th>Telefoon</th>
                        <th>Aangemaakt op</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="tabel-klanten"></tbody>
            </table>
        </div>

<!-- Tabblad: Uitleningen -->
        <div class="tab-pane fade" id="uitleningen">
            <h4 class="mb-3">Uitleningen beheren</h4>
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Boek</th>
                        <th>Klant</th>
                        <th>Datum uit</th>
                        <th>Datum terug</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="tabel-uitleningen"></tbody>
            </table>
        </div>

    </div>
</div>

<!-- Modal: Boek toevoegen -->
<div class="modal fade" id="modalBoekToevoegen" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Boek toevoegen</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="boek-melding"></div>
                <div class="mb-3">
                    <label class="form-label">Titel</label>
                    <input type="text" id="boek-titel" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Auteur</label>
                    <input type="text" id="boek-auteur" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Uitgever</label>
                    <input type="text" id="boek-uitgever" class="form-control" required>
                </div>                
                <div class="mb-3">
                    <label class="form-label">Taal</label>
                    <input type="text" id="boek-taal" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Aantal pagina's</label>
                    <input type="text" id="boek-aantal-paginas" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Genre</label>
                    <input type="text" id="boek-genre" class="form-control">
                </div>                
                <div class="mb-3">
                    <label class="form-label">ISBN</label>
                    <input type="text" id="boek-isbn" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Publicatie datum</label>
                    <input type="date" id="boek-publicatie-datum" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuleren</button>
                <button type="button" class="btn btn-primary" onclick="boekToevoegen()">Opslaan</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
